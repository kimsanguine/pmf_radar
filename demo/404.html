<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — PMF Radar</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { max-width: 480px; padding: 2rem; }
    h1 { font-size: 4rem; margin: 0 0 0.5rem; color: #6366f1; }
    p  { font-size: 1.1rem; color: #94a3b8; margin: 0 0 1.5rem; }
    a  {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      background: #6366f1;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>요청한 파일 또는 페이지를 찾을 수 없습니다.</p>
    <a href="/">대시보드로 돌아가기</a>
  </div>

</html>
