name = "channel-talk-inbound"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# T2 Channel Talk Inbound Worker
# habix.ai Cloudflare 계정에 배포

[vars]
# Supabase URL (공개값, secret 아님)
SUPABASE_URL = "https://ypbsgiqyeztzdhtaedfi.supabase.co"

# ---------------------------------------------------------------------------
# Secrets — wrangler secret put 으로 설정 (절대 이 파일에 명시 금지)
# ---------------------------------------------------------------------------
# wrangler secret put CHANNEL_TALK_WEBHOOK_TOKEN
# wrangler secret put SUPABASE_SERVICE_ROLE_KEY

# ---------------------------------------------------------------------------
# Routes — habix.ai 도메인에 연결
# Channel Talk 설정: https://developers.channel.io → Webhook → Endpoint URL
#   예: https://channel-talk-inbound.habix.ai/?token=<SECRET>
#   또는: https://cs-inbound.habix.ai/channel-talk?token=<SECRET>
# ---------------------------------------------------------------------------
# routes = [
#   { pattern = "channel-talk-inbound.habix.ai/*", zone_name = "habix.ai" }
# ]

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
[observability]
enabled = true
head_sampling_rate = 1
